<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Numune Listesi</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f1ec;
    color: #2b2620;
    padding-bottom: 30px;
  }
  header {
    background: #6b4226;
    color: #fff;
    padding: 14px 16px;
    position: sticky;
    top: 0;
  }
  header h1 { margin: 0; font-size: 18px; }
  .stats {
    padding: 8px 16px;
    font-size: 13px;
    color: #6b5c44;
  }
  .list { padding: 6px 12px; }
  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .row.sent {
    background: #eef7ea;
  }
  .row.sent .name {
    text-decoration: line-through;
    color: #7a8c6e;
  }
  .row { flex-direction: column; align-items: stretch; }
  .row-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .name { font-size: 15px; flex: 1; padding-right: 10px; }
  .check-btn {
    border: none;
    border-radius: 18px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .check-btn.not-sent { background: #ece0d0; color: #7a6a52; }
  .check-btn.sent { background: #4a8c3a; color: #fff; }
  .addr-input {
    margin-top: 8px;
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid #ddd4c5;
    font-size: 13px;
    background: #fcfbf8;
  }
</style>
</head>
<body>

<header><h1>📦 Numune Gönderim Takibi</h1></header>
<div class="stats" id="stats"></div>
<div class="list" id="list"></div>

<script>
const names = [
"Esko Bilal abi","Emc","Ahmet kaya turgutlu","Çınar ticaret","Diyar Mehmet Marmaris",
"Mehmet abi Urla","Metin Kıbrıs","Mtc Marmaris","Mya ibrahim","Nasıl abi denizli",
"Narlidere yasin toptan","Oral abi Tokel","Retro nargile","Shelby tobacco Ferit",
"Sinan bey lüle","Suma zafer kibris","Sultan nargile Burak","Usame avcı",
"m.t.s Hookah Amasya","Cls nargile instagram","Dogu nargile instagram",
"Hck nargile Store instagram","Hugo nargile shop instagram","Demirhan nargile instagram",
"Turbo nargile instagram","Alfe shisha official","Oruç tobacco","Olimpos tobacco",
"Aksihar tobacco","Makru Hookah","Asya nargile toptan","Duhan tobacco shop",
"Nargilecim askin tobacco","Şah nargile","Ceyran","Tokel","Beyrok a s","Bahrin nargile",
"Mix tobacco shop","Yigit nargile güneşli","Lab coffe hookah"
];

const KEY = 'numune-liste-basit-v2';
let itemState = {};

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) itemState = JSON.parse(raw);
  } catch (e) { itemState = {}; }
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(itemState)); }
  catch (e) { console.error(e); }
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  let sentCount = 0;

  names.forEach((n, i) => {
    const id = 'n' + i;
    if (!itemState[id]) itemState[id] = { sent: false, addr: '' };
    const item = itemState[id];
    if (item.sent) sentCount++;

    const row = document.createElement('div');
    row.className = 'row' + (item.sent ? ' sent' : '');
    row.innerHTML = `
      <div class="row-top">
        <div class="name">${n}</div>
        <button class="check-btn ${item.sent ? 'sent' : 'not-sent'}" data-id="${id}">
          ${item.sent ? '✓ Gönderildi' : 'Gönder →'}
        </button>
      </div>
      <input class="addr-input" type="text" data-id="${id}" placeholder="Adres / telefon (opsiyonel)" value="${item.addr || ''}">
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('.check-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      itemState[id].sent = !itemState[id].sent;
      save();
      render();
    });
  });

  list.querySelectorAll('.addr-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const id = inp.dataset.id;
      itemState[id].addr = inp.value;
      clearTimeout(inp._t);
      inp._t = setTimeout(save, 500);
    });
  });

  document.getElementById('stats').textContent =
    `Toplam: ${names.length} · Gönderildi: ${sentCount} · Bekliyor: ${names.length - sentCount}`;
}

load();
render();
</script>

</body>
</html>
